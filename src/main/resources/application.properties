# OmniLaudo Mock Modality - Application Properties

spring.application.name=omnilaudo-mock-modality
server.port=8081

# Logging
logging.level.root=INFO
logging.level.com.omnilaudo.mockmodality=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Modality Configuration
modality.orthanc.url=http://orthanc:8042
modality.orthanc.username=
modality.orthanc.password=

# DICOM Configuration
modality.dicom.host=orthanc
modality.dicom.port=4242
modality.aet=MOCK_MODALITY
modality.orthanc.aet=ORTHANC

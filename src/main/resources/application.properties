# OmniLaudo Mock Modality - Application Properties
# Use localhost when running outside Docker (connects to Docker network via port mapping)

spring.application.name=omnilaudo-mock-modality
server.port=8081

# Logging
logging.level.root=INFO
logging.level.com.omnilaudo.mockmodality=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Modality Configuration - Use localhost for local execution, orthanc for Docker
modality.orthanc.url=http://localhost:8042
modality.orthanc.username=orthanc
modality.orthanc.password=orthanc

# RIS API Configuration
modality.ris.url=http://localhost:3001/api/v1/dicom/worklist
modality.ris.token=

# DICOM Configuration
modality.dicom.host=localhost
modality.dicom.port=4242
modality.aet=OMNILAUDO
modality.orthanc.aet=ORTHANC